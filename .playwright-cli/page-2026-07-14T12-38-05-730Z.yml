        - generic [ref=e65] [cursor=pointer]: Aprendizajes (5)
        - list [ref=e67]:
          - listitem [ref=e68]: "Un porcentaje de reducción sin conocer el valor absoluto de partida puede ser engañoso: el contexto es tan parte del análisis como el propio dato."
          - listitem [ref=e69]: La ausencia de datos también es información — los países sin mix energético reportado en OWID son, en general, los que no han emprendido ninguna transición activa.
          - listitem [ref=e70]: Dashboard Actions en Tableau exige nombres y tipos de campo idénticos entre hojas; usar una función de agregación en vez del campo directo puede romper el resaltado cruzado entre visualizaciones.
          - listitem [ref=e71]: Los filtros a nivel de fuente de datos son más fiables que los de hoja para eliminar valores nulos de los selectores.
          - listitem [ref=e72]: Estructurar cada visualización alrededor de una única pregunta mejora la legibilidad del dashboard más que añadir más gráficos.
    - generic [ref=e74]:
      - heading "Mejoras futuras" [level=2] [ref=e75]
      - list [ref=e76]:
        - listitem [ref=e77]: Incorporar el PIB vía la API del Banco Mundial para extender el análisis de desacoplamiento más allá de 2022.
        - listitem [ref=e78]: Documentar los países con datos parciales (Corea del Norte, Yemen, Siria) como información analítica explícita, en vez de tratarlos como huecos sin más.
        - listitem [ref=e79]: Incorporar datos mensuales de la IEA para captar variaciones estacionales que la granularidad anual no recoge.
    - generic [ref=e83]:
      - heading "Si volviera a empezar…" [level=2] [ref=e84]
      - list [ref=e85]:
        - listitem [ref=e86]: Diseñaría el modelo pensando primero en las preguntas de negocio a responder, no en los datos disponibles.
        - listitem [ref=e87]: Añadiría tests de dbt (not_null, unique, relationships) desde el inicio, en vez de dejarlos como mejora futura.
        - listitem [ref=e88]: Incorporaría datos de política climática desde el principio, para poder hablar de causalidad y no solo de correlación.
