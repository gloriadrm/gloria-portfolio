      - generic [ref=e18]: Caso de estudio
      - heading "Transición energética y descarbonización global" [level=1] [ref=e19]
      - paragraph [ref=e20]: ¿Qué países reducen emisiones por una transición energética real y cuáles solo por el colapso de su economía, y cómo cambia el ranking de descarbonización según se mida en términos absolutos o porcentuales?
    - generic [ref=e22]:
      - heading "Dataset" [level=2] [ref=e23]
      - paragraph [ref=e24]:
        - text: Datos públicos de
        - strong [ref=e25]: Our World in Data (OWID)
        - text: ", con metodología equivalente a la del IPCC y la IEA: series de emisiones de CO₂ ("
        - code [ref=e26]: owid-co2-data
        - text: ", ~50.000 registros) y de mix energético ("
        - code [ref=e27]: owid-energy-data
        - text: ", ~22.000 registros) para más de 190 países. El análisis se acota a 1990 por las discontinuidades que introduce la disolución de la URSS en los datos de Europa del Este, y a 2022 por la disponibilidad de datos de PIB."
      - heading "Arquitectura" [level=2] [ref=e28]
      - paragraph [ref=e29]:
        - 'img "Arquitectura del pipeline: fuentes en RAW_OWID, staging, intermediate y marts en dbt" [ref=e30]'
      - paragraph [ref=e31]:
        - emphasis [ref=e32]: Snowflake actúa como warehouse; dbt Core organiza la transformación en tres capas hasta la tabla de hechos que consume Tableau.
      - paragraph [ref=e33]:
        - code [ref=e34]: stg_co2
        - text: "y"
        - code [ref=e35]: stg_energy
        - text: limpian y tipan cada fuente por separado.
        - code [ref=e36]: int_country_year_energy
        - text: "las cruza por país y año, y es la única base de la que derivan los tres marts: la tabla de hechos unpivotada ("
        - code [ref=e37]: fct_country_year_metrics
        - text: ) y dos reports especializados en descarbonización y en la relación PIB–CO₂.
      - heading "Decisiones de diseño" [level=2] [ref=e38]
      - paragraph [ref=e39]:
        - strong [ref=e40]: Carga directa a Snowflake, sin scripts intermedios.
        - text: Los CSV de OWID se importan tal cual a
        - code [ref=e41]: RAW_OWID
        - text: ; toda la limpieza, el tipado y el modelado ocurren después, versionados y testeados en dbt. Simplifica la ingesta y hace el pipeline reproducible desde una fuente pública, sin infraestructura adicional que mantener.
      - paragraph [ref=e42]:
        - strong [ref=e43]: Formato largo en la tabla de hechos.
        - code [ref=e44]: fct_country_year_metrics
        - text: unpivota 16 métricas a formato (country, year, metric, value) en vez de mantenerlas en columnas. Permite filtrar cualquier métrica en Tableau con un único parámetro dinámico, sin campos calculados por visualización — al coste de queries SQL menos directas fuera del dashboard.
      - paragraph [ref=e45]:
        - strong [ref=e46]: Un parámetro para alternar entre reducción porcentual y absoluta
        - text: ", en vez de fijar una sola métrica de descarbonización."
      - paragraph [ref=e47]:
        - 'img "Descarbonización: top países y desacoplamiento PIB vs. CO₂, alternando entre reducción porcentual y absoluta" [ref=e48]'
      - paragraph [ref=e49]:
        - emphasis [ref=e50]: "Descarbonización — top países y desacoplamiento PIB vs. CO₂. Alternar el parámetro cambia el ranking por completo: Moldavia, Ucrania y Estonia lideran en porcentual por el colapso económico postsoviético; Rusia, Ucrania y Alemania lideran en absoluto por el volumen de CO₂ retirado."
      - heading "Resultado" [level=2] [ref=e51]
      - paragraph [ref=e52]:
        - 'img "Visión Global: mapa interactivo de emisiones por país y década" [ref=e53]'
      - paragraph [ref=e54]:
        - 'img "Visión Global: evolución del mix energético y desglose renovable" [ref=e55]'
      - paragraph [ref=e56]:
        - emphasis [ref=e57]: Visión Global — evolución de emisiones y mix energético por país. Filtrar un país en el mapa actualiza el resto de gráficos mediante Dashboard Actions; el histórico de mix energético permite comparar la velocidad de adopción renovable entre países.
    - generic [ref=e59]:
      - generic [ref=e60]:
