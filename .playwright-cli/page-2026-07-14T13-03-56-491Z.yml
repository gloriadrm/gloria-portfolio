        - generic [ref=e80] [cursor=pointer]: Aprendizajes (5)
        - list [ref=e82]:
          - listitem [ref=e83]: "Un porcentaje de reducción sin conocer el valor absoluto de partida puede ser engañoso: el contexto es tan parte del análisis como el propio dato."
          - listitem [ref=e84]: La ausencia de datos también es información — los países sin mix energético reportado en OWID son, en general, los que no han emprendido ninguna transición activa.
          - listitem [ref=e85]: Dashboard Actions en Tableau exige nombres y tipos de campo idénticos entre hojas; usar una función de agregación en vez del campo directo puede romper el resaltado cruzado entre visualizaciones.
          - listitem [ref=e86]: Los filtros a nivel de fuente de datos son más fiables que los de hoja para eliminar valores nulos de los selectores.
          - listitem [ref=e87]: Estructurar cada visualización alrededor de una única pregunta mejora la legibilidad del dashboard más que añadir más gráficos.
    - generic [ref=e89]:
      - heading "Mejoras futuras" [level=2] [ref=e90]
      - list [ref=e91]:
        - listitem [ref=e92]: Incorporar el PIB vía la API del Banco Mundial para extender el análisis de desacoplamiento más allá de 2022.
        - listitem [ref=e93]: Documentar los países con datos parciales (Corea del Norte, Yemen, Siria) como información analítica explícita, en vez de tratarlos como huecos sin más.
        - listitem [ref=e94]: Incorporar datos mensuales de la IEA para captar variaciones estacionales que la granularidad anual no recoge.
    - generic [ref=e98]:
      - heading "Si volviera a empezar…" [level=2] [ref=e99]
      - list [ref=e100]:
        - listitem [ref=e101]: Diseñaría el modelo pensando primero en las preguntas de negocio a responder, no en los datos disponibles.
        - listitem [ref=e102]: Añadiría tests de dbt (not_null, unique, relationships) desde el inicio, en vez de dejarlos como mejora futura.
        - listitem [ref=e103]: Incorporaría datos de política climática desde el principio, para poder hablar de causalidad y no solo de correlación.
